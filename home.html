<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg: var(--tg-theme-bg-color,#0a0a0a); --card: var(--tg-theme-secondary-bg-color,#1a1a1a);
      --text: var(--tg-theme-text-color,#fff); --muted: var(--tg-theme-hint-color,#8a8a8a); --accent:#0d9e88; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:18px 14px 36px; line-height:1.5; }
    .hero { text-align:center; margin-bottom:18px; }
    .hero h1 { font-size:24px; font-weight:700; color:var(--accent); }
    .hero p { font-size:13px; color:var(--muted); margin-top:6px; }
    .video { position:relative; width:100%; aspect-ratio:16/9; background:var(--card); border-radius:14px; overflow:hidden; margin:16px 0; display:flex; align-items:center; justify-content:center; }
    .video iframe { width:100%; height:100%; border:0; }
    .video .ph { text-align:center; color:var(--muted); font-size:13px; padding:16px; }
    .sect { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:18px 0 8px; }
    .link { display:flex; align-items:center; gap:12px; background:var(--card); border-radius:12px; padding:14px 16px; margin-bottom:8px; cursor:pointer; }
    .link .ic { font-size:20px; }
    .link b { font-size:15px; }
    .link span { display:block; font-size:12px; color:var(--muted); }
    .back { width:100%; margin-top:22px; padding:14px; border:none; border-radius:12px; background:var(--accent); color:#042; font-weight:600; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Business UP</h1>
    <p>Nessun guru. Nessun filtro. Solo dati e logica.</p>
  </div>

  <div class="video" id="video">
    <div class="ph">🎬 Video di presentazione<br><small>(inserisci qui il link del video)</small></div>
  </div>

  <div class="sect">I nostri progetti</div>
  <div class="link" data-url="https://tradingmatematicopro.com"><div class="ic">📈</div><div><b>Trading Matematico Pro</b><span>tradingmatematicopro.com</span></div></div>
  <div class="link" data-url="https://cashly.it"><div class="ic">💸</div><div><b>Cashly</b><span>cashly</span></div></div>

  <div class="sect">Seguici</div>
  <div class="link" data-url="https://youtube.com"><div class="ic">▶️</div><div><b>YouTube</b><span>I nostri video</span></div></div>
  <div class="link" data-url="https://instagram.com"><div class="ic">📷</div><div><b>Instagram</b><span>Aggiornamenti</span></div></div>

  <button class="back" id="back">Torna al bot</button>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    function open(u) { if (TG && TG.openLink) TG.openLink(u); else window.open(u, "_blank"); }
    document.querySelectorAll(".link").forEach((l) => l.addEventListener("click", () => open(l.dataset.url)));
    document.getElementById("back").addEventListener("click", () => { if (TG) TG.close(); });
    // Per inserire il video: sostituisci il blocco .ph con <iframe src="URL_EMBED" allowfullscreen></iframe>
  </script>
</body>
</html>
