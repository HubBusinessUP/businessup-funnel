<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Benvenuto — Business UP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0b0c0e;--surface:#15171a;--surface2:#1d2024;--line:rgba(255,255,255,.07);--text:#eceef0;--muted:#8b9096;--accent:#0d9e88;--accent2:#19cdac;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:520px;margin:0 auto;padding:26px 18px;width:100%;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:14px;letter-spacing:1.5px;margin-bottom:22px;}
  .brand .bdot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px 2px rgba(13,158,136,.7);}
  .msg{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;font-size:16px;line-height:1.6;}
  .msg .em{color:var(--accent2);font-weight:700;}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-weight:800;font-size:16px;font-family:inherit;margin-top:18px;text-align:center;text-decoration:none;cursor:pointer;background:var(--accent);color:#04221c;}
  .priv{text-align:center;font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5;}
</style></head>
<body>
<div class="wrap">
  <div class="brand"><span class="bdot"></span>BUSINESS UP</div>
  <div class="msg">
    Ciao 👋 Sono il bot di <span class="em">Business UP</span>.<br><br>
    Nessun guru, nessun filtro: solo dati e logica.<br><br>
    Prima di mostrarti qualcosa voglio capire dove sei: <b>2 minuti di sondaggio</b>.
  </div>
  <a class="btn" href="sondaggio.html">Inizia il sondaggio →</a>
  <div class="priv">Premendo "Inizia" accetti il trattamento dei tuoi dati (informativa privacy).</div>
</div>
</body></html>
