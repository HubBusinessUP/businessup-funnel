<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Business List - Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0b0c0e; --surface:#15171a; --surface2:#1d2024; --line:rgba(255,255,255,.07); --text:#eceef0; --muted:#8b9096; --accent:#0d9e88; --accent2:#19cdac; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:16px 14px calc(34px + env(safe-area-inset-bottom)); line-height:1.5; -webkit-font-smoothing:antialiased; }
    body > * { max-width:520px; margin-left:auto; margin-right:auto; }
    h1 { font-size:23px; font-weight:800; letter-spacing:-.3px; }
    .sub { font-size:13px; color:var(--muted); margin-bottom:16px; margin-top:2px; }
    .cat { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:600; margin:20px 4px 8px; }
    .svc { display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:9px; cursor:pointer; transition:background .12s ease; }
    .svc:active { background:var(--surface2); }
    .svc .ic { width:40px; height:40px; border-radius:11px; background:rgba(13,158,136,.14); display:grid; place-items:center; font-size:18px; flex:none; }
    .svc .t { flex:1; } .svc .t b { font-size:15px; display:block; font-weight:600; } .svc .t span { font-size:12px; color:var(--muted); }
    .svc .ch { color:var(--muted); font-size:19px; }
    .back { width:100%; margin-top:22px; padding:14px; border:none; border-radius:13px; background:var(--surface2); color:var(--text); border:1px solid var(--line); font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; }
    .sheet { position:fixed; inset:0; background:var(--bg); padding:18px 16px calc(30px + env(safe-area-inset-bottom)); overflow-y:auto; transform:translateY(100%); transition:transform .25s; }
    .sheet > * { max-width:520px; margin-left:auto; margin-right:auto; }
    .sheet.open { transform:translateY(0); }
    .x { font-size:14px; color:var(--accent2); cursor:pointer; margin-bottom:12px; display:inline-block; font-weight:600; }
    h2 { font-size:23px; font-weight:800; letter-spacing:-.3px; }
    .meta { font-size:13px; color:var(--muted); margin:4px 0 16px; }
    .desc { font-size:15px; color:#cfd2d6; line-height:1.6; margin-bottom:16px; }
    .res { display:block; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:8px; font-size:14px; color:var(--accent2); font-weight:600; cursor:pointer; }
    .cta { width:100%; padding:15px; border:none; border-radius:13px; background:var(--accent); color:#04221c; font-weight:700; font-size:16px; cursor:pointer; margin-top:18px; font-family:inherit; }
    .ghost { width:100%; padding:13px; border:none; border-radius:13px; background:var(--surface2); color:var(--text); border:1px solid var(--line); font-weight:600; font-size:14px; cursor:pointer; margin-top:8px; font-family:inherit; }
    .step { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:10px; }
    .step .n { font-size:11px; color:var(--accent2); font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
    .step .st { font-size:16px; font-weight:700; margin:4px 0; }
    .step .sb { font-size:14px; color:var(--muted); line-height:1.55; }
    .hidden { display:none; }
    .ok { text-align:center; padding:30px 10px; }
    .ok .big { font-size:40px; } .ok b { display:block; font-size:18px; margin:10px 0 6px; } .ok span { color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
  <h1>Business List</h1>
  <div class="sub">I metodi e i servizi Business UP, per categoria.</div>
  <div id="list"><div class="sub">Caricamento...</div></div>
  <button class="back" id="back">Torna al bot</button>

  <div class="sheet" id="sheet">
    <span class="x" id="closeSheet">‹ Indietro</span>
    <div id="infoView">
      <h2 id="sName"></h2>
      <div class="meta" id="sMeta"></div>
      <div class="desc" id="sDesc"></div>
      <div id="sRes"></div>
      <button class="cta" id="startAttiva">Attiva servizio</button>
    </div>
    <div id="attivaView" class="hidden">
      <h2>Attivazione</h2>
      <div class="meta" id="aServ"></div>
      <div id="aSteps"></div>
      <button class="cta" id="confirm">Conferma attivazione</button>
      <button class="ghost" id="backInfo">Torna alla scheda</button>
    </div>
  </div>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const EDGE = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const INIT = TG ? TG.initData : "";
    const ICONS = { "Broker vs Broker":"🔁","Prop vs Broker":"🏦","Bonus ADM":"🎁","BvB Swap":"🔄" };
    let current = null;
    function openLink(u){ if(TG&&TG.openLink) TG.openLink(u); else window.open(u,"_blank"); }

    // Passi di attivazione (generici per ora, poi personalizzati per servizio)
    const STEPS = [
      ["Requisiti", "Controlla di avere capitale ed esperienza adatti a questo metodo (vedi la scheda)."],
      ["Apri i conti", "Apri o collega i conti broker necessari. Ti guidiamo passo-passo."],
      ["Conferma", "Premi 'Conferma attivazione': ti contattiamo coi passi operativi e il supporto dedicato."],
    ];

    async function load() {
      let d;
      try { d = await (await fetch(EDGE + "/catalogo")).json(); }
      catch { document.getElementById("list").innerHTML = '<div class="sub">Errore di caricamento.</div>'; return; }
      const list = document.getElementById("list");
      list.innerHTML = (d.categorie || []).map(cat => `
        <div class="cat">${cat.nome}</div>
        ${cat.servizi.map(s => `<div class="svc" data-id="${s.id}">
          <div class="ic">${ICONS[s.nome] || "📊"}</div>
          <div class="t"><b>${s.nome}</b><span>${s.descrizione || ""}</span></div>
          <div class="ch">›</div></div>`).join("")}`).join("");
      window.SERVIZI = {};
      (d.categorie || []).forEach(c => c.servizi.forEach(s => window.SERVIZI[s.id] = s));
      document.querySelectorAll(".svc").forEach(el => el.addEventListener("click", () => openSheet(el.dataset.id)));
    }

    function openSheet(id) {
      const s = window.SERVIZI[id]; if (!s) return;
      current = s;
      showInfo();
      document.getElementById("sName").textContent = s.nome;
      document.getElementById("sMeta").textContent = (s.categoria || "") + (s.prezzo ? " · " + s.prezzo : "");
      document.getElementById("sDesc").textContent = s.descrizione || "";
      const res = Array.isArray(s.risorse) ? s.risorse : [];
      document.getElementById("sRes").innerHTML = res.map(r => `<span class="res" data-u="${r.url}">🔗 ${r.label || r.url}</span>`).join("");
      document.querySelectorAll("#sRes .res").forEach(e => e.addEventListener("click", () => openLink(e.dataset.u)));
      document.getElementById("sheet").classList.add("open");
    }
    function showInfo() { document.getElementById("infoView").classList.remove("hidden"); document.getElementById("attivaView").classList.add("hidden"); }
    function showAttiva() {
      document.getElementById("infoView").classList.add("hidden");
      document.getElementById("attivaView").classList.remove("hidden");
      document.getElementById("aServ").textContent = current ? current.nome : "";
      document.getElementById("aSteps").innerHTML = STEPS.map((s,i)=>`<div class="step"><div class="n">Passo ${i+1}</div><div class="st">${s[0]}</div><div class="sb">${s[1]}</div></div>`).join("");
      document.getElementById("confirm").disabled = false;
      document.getElementById("confirm").textContent = "Conferma attivazione";
    }

    document.getElementById("startAttiva").addEventListener("click", showAttiva);
    document.getElementById("backInfo").addEventListener("click", showInfo);
    document.getElementById("closeSheet").addEventListener("click", () => document.getElementById("sheet").classList.remove("open"));
    document.getElementById("back").addEventListener("click", () => { if (TG) TG.close(); });

    document.getElementById("confirm").addEventListener("click", async () => {
      if (!current) return;
      const btn = document.getElementById("confirm");
      btn.disabled = true; btn.textContent = "Invio...";
      try {
        const r = await fetch(EDGE + "/attiva", { method:"POST", headers:{ "Content-Type":"application/json", "x-telegram-init-data": INIT }, body: JSON.stringify({ servizio_id: current.id }) });
        if (!r.ok) throw 0;
        const data = await r.json().catch(() => ({}));
        const refBtn = data.ref_link ? `<button class="cta" id="goServ" style="margin-top:14px">Vai al servizio / Iscriviti</button>` : "";
        document.getElementById("attivaView").innerHTML =
          `<div class="ok"><div class="big">✅</div><b>Attivazione richiesta!</b><span>Ti contattiamo a breve coi passi operativi.${data.ref_link ? " Intanto iscriviti qui:" : ""}</span>${refBtn}<button class="ghost" id="done2" style="margin-top:10px">Chiudi</button></div>`;
        if (data.ref_link) document.getElementById("goServ").addEventListener("click", () => openLink(data.ref_link));
        document.getElementById("done2").addEventListener("click", () => document.getElementById("sheet").classList.remove("open"));
        if (TG && TG.HapticFeedback) TG.HapticFeedback.notificationOccurred("success");
      } catch {
        btn.disabled = false; btn.textContent = "Conferma attivazione";
        if (TG && TG.showAlert) TG.showAlert("Apri questa pagina dal bot (bottone Business List) per confermare.");
        else alert("Apri dal bot per confermare.");
      }
    });

    load();
  </script>
</body>
</html>
