<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Business List - Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg: var(--tg-theme-bg-color,#0a0a0a); --card: var(--tg-theme-secondary-bg-color,#1a1a1a);
      --text: var(--tg-theme-text-color,#fff); --muted: var(--tg-theme-hint-color,#8a8a8a); --accent:#0d9e88; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:18px 14px 36px; line-height:1.5; }
    h1 { font-size:20px; font-weight:700; color:var(--accent); }
    .sub { font-size:13px; color:var(--muted); margin-bottom:14px; }
    .cat { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:18px 0 8px; }
    .svc { display:flex; align-items:center; gap:12px; background:var(--card); border-radius:12px; padding:15px 16px; margin-bottom:8px; cursor:pointer; }
    .svc .ic { width:38px; height:38px; border-radius:10px; background:rgba(13,158,136,.15); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .svc .t { flex:1; }
    .svc .t b { font-size:15px; display:block; }
    .svc .t span { font-size:12px; color:var(--muted); }
    .svc .ch { color:var(--muted); }
    .back { width:100%; margin-top:22px; padding:14px; border:none; border-radius:12px; background:var(--card); color:var(--text); font-weight:600; font-size:15px; cursor:pointer; }
    /* sheet */
    .sheet { position:fixed; inset:0; background:var(--bg); padding:18px 16px 30px; overflow-y:auto; transform:translateY(100%); transition:transform .25s; }
    .sheet.open { transform:translateY(0); }
    .sheet .x { font-size:14px; color:var(--muted); cursor:pointer; margin-bottom:10px; display:inline-block; }
    .sheet h2 { font-size:22px; font-weight:700; }
    .sheet .meta { font-size:13px; color:var(--muted); margin:4px 0 14px; }
    .sheet .desc { font-size:15px; margin-bottom:16px; }
    .res { display:block; background:var(--card); border-radius:10px; padding:12px 14px; margin-bottom:8px; font-size:14px; color:var(--accent); cursor:pointer; }
    .cta { width:100%; padding:15px; border:none; border-radius:12px; background:var(--accent); color:#042; font-weight:700; font-size:16px; cursor:pointer; margin-top:18px; }
    .note { font-size:12px; color:var(--muted); text-align:center; margin-top:10px; }
  </style>
</head>
<body>
  <h1>Business List</h1>
  <div class="sub">I metodi e i servizi Business UP, per categoria.</div>
  <div id="list"><div class="sub">Caricamento...</div></div>
  <button class="back" id="back">Torna al bot</button>

  <div class="sheet" id="sheet">
    <span class="x" id="closeSheet">‹ Indietro</span>
    <h2 id="sName"></h2>
    <div class="meta" id="sMeta"></div>
    <div class="desc" id="sDesc"></div>
    <div id="sRes"></div>
    <button class="cta" id="attiva">Attiva servizio</button>
    <div class="note">Premendo attivi la richiesta: ti ricontattiamo coi passi di attivazione.</div>
  </div>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const EDGE = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const ICONS = { "Broker vs Broker":"🔁","Prop vs Broker":"🏦","Bonus ADM":"🎁","BvB Swap":"🔄" };
    let current = null;
    function openLink(u){ if(TG&&TG.openLink) TG.openLink(u); else window.open(u,"_blank"); }

    async function load() {
      let d;
      try { d = await (await fetch(EDGE + "/catalogo")).json(); }
      catch { document.getElementById("list").innerHTML = '<div class="sub">Errore di caricamento.</div>'; return; }
      const list = document.getElementById("list");
      list.innerHTML = (d.categorie || []).map(cat => `
        <div class="cat">${cat.nome}</div>
        ${cat.servizi.map(s => `<div class="svc" data-id="${s.id}">
          <div class="ic">${ICONS[s.nome] || "📊"}</div>
          <div class="t"><b>${s.nome}</b><span>${s.descrizione || ""}</span></div>
          <div class="ch">›</div></div>`).join("")}`).join("");
      window.SERVIZI = {};
      (d.categorie || []).forEach(c => c.servizi.forEach(s => window.SERVIZI[s.id] = s));
      document.querySelectorAll(".svc").forEach(el => el.addEventListener("click", () => openSheet(el.dataset.id)));
    }

    function openSheet(id) {
      const s = window.SERVIZI[id]; if (!s) return;
      current = s;
      document.getElementById("sName").textContent = s.nome;
      document.getElementById("sMeta").textContent = (s.categoria || "") + (s.prezzo ? " · " + s.prezzo : "");
      document.getElementById("sDesc").textContent = s.descrizione || "";
      const res = Array.isArray(s.risorse) ? s.risorse : [];
      document.getElementById("sRes").innerHTML = res.map(r => `<span class="res" data-u="${r.url}">🔗 ${r.label || r.url}</span>`).join("");
      document.querySelectorAll("#sRes .res").forEach(e => e.addEventListener("click", () => openLink(e.dataset.u)));
      document.getElementById("sheet").classList.add("open");
    }
    document.getElementById("closeSheet").addEventListener("click", () => document.getElementById("sheet").classList.remove("open"));
    document.getElementById("back").addEventListener("click", () => { if (TG) TG.close(); });

    document.getElementById("attiva").addEventListener("click", async () => {
      if (!current) return;
      if (!TG || !TG.initData) { alert("Apri dal bot Telegram."); return; }
      const btn = document.getElementById("attiva");
      btn.disabled = true; btn.textContent = "Invio...";
      try {
        await fetch(EDGE + "/attiva", { method:"POST", headers:{ "Content-Type":"application/json", "x-telegram-init-data": TG.initData }, body: JSON.stringify({ servizio_id: current.id }) });
        btn.textContent = "✓ Richiesta inviata";
        document.querySelector(".note").textContent = "Fatto! Ti ricontattiamo a breve per l'attivazione.";
        if (TG.HapticFeedback) TG.HapticFeedback.notificationOccurred("success");
      } catch { btn.disabled = false; btn.textContent = "Attiva servizio"; }
    });

    load();
  </script>
</body>
</html>
