<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Prop vs Broker - Tutorial Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0b0c0e; --surface:#15171a; --surface2:#1d2024; --line:rgba(255,255,255,.07); --text:#eceef0; --muted:#8b9096; --accent:#0d9e88; --accent2:#19cdac; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased; padding:10px 14px calc(34px + env(safe-area-inset-bottom)); }
    .wrap { max-width:520px; margin:0 auto; }
    .appbar { display:flex; align-items:center; gap:12px; padding:8px 2px 16px; }
    .nav { width:38px; height:38px; border-radius:11px; background:var(--surface2); border:1px solid var(--line); display:grid; place-items:center; font-size:20px; cursor:pointer; flex:none; }
    .ic { width:42px; height:42px; border-radius:13px; background:rgba(13,158,136,.16); display:grid; place-items:center; font-size:20px; flex:none; }
    .appbar .t { font-size:12px; color:var(--muted); font-weight:600; }
    .appbar .n { font-size:18px; font-weight:700; letter-spacing:-.2px; line-height:1.2; }
    .video { position:relative; width:100%; aspect-ratio:16/9; border-radius:16px; overflow:hidden; border:1px solid var(--line); background:#000; margin-bottom:16px; }
    .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .progress { height:6px; background:var(--surface2); border-radius:999px; overflow:hidden; margin-bottom:8px; }
    .progress > i { display:block; height:100%; background:var(--accent); border-radius:999px; transition:width .25s ease; }
    .pmeta { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); font-weight:600; margin-bottom:14px; }
    .stepcard { background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:22px 18px; min-height:200px; }
    .stepcard .kicker { font-size:12px; color:var(--accent2); font-weight:700; letter-spacing:.4px; text-transform:uppercase; }
    .stepcard .h { font-size:22px; font-weight:800; letter-spacing:-.3px; margin:8px 0 12px; }
    .stepcard .b { font-size:15px; color:#cfd2d6; line-height:1.65; }
    .navrow { display:flex; gap:10px; margin-top:16px; }
    .btn { flex:1; padding:14px; border:none; border-radius:13px; font-weight:700; font-size:15px; font-family:inherit; cursor:pointer; transition:transform .1s ease, filter .1s ease; }
    .btn:active { transform:scale(.99); filter:brightness(.95); }
    .btn:disabled { opacity:.4; }
    .btn-accent { background:var(--accent); color:#04221c; }
    .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--line); }
    .done { text-align:center; padding:18px 6px; }
    .done .big { font-size:42px; } .done b { display:block; font-size:18px; margin:10px 0 4px; } .done span { color:var(--muted); font-size:14px; }
    .badge { display:inline-flex; align-items:center; gap:7px; color:var(--accent2); font-weight:700; background:rgba(13,158,136,.1); border:1px solid rgba(13,158,136,.28); padding:8px 14px; border-radius:999px; margin:10px 0 16px; }
    .foot { text-align:center; font-size:11px; color:var(--muted); margin-top:22px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="appbar">
      <div class="nav" id="back">‹</div>
      <div class="ic">🏦</div>
      <div><div class="t">Tutorial</div><div class="n">Prop vs Broker</div></div>
    </div>

    <div class="video"><iframe src="https://www.youtube.com/embed/zqJSGq3JDd4" title="Video tutorial" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>

    <div id="stage">
      <div class="progress"><i id="bar"></i></div>
      <div class="pmeta"><span id="pnum"></span><span>Conto finanziato o capitale tuo</span></div>
      <div class="stepcard">
        <div class="kicker" id="kick"></div>
        <div class="h" id="sh"></div>
        <div class="b" id="sb"></div>
      </div>
      <div class="navrow">
        <button class="btn btn-ghost" id="prev">Indietro</button>
        <button class="btn btn-accent" id="next">Avanti</button>
      </div>
    </div>

    <div class="foot">Business UP — Il trading comporta rischi. Non è consulenza finanziaria.</div>
  </div>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const UID = TG && TG.initDataUnsafe && TG.initDataUnsafe.user ? TG.initDataUnsafe.user.id : null;
    const TRACK = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot/track";
    const KEY = "prop";
    const STEPS = [["La scelta", "Fare trading come cliente di un broker, oppure diventare prop trader con capitale finanziato."], ["Broker tradizionale", "Libertà totale e profitti tuoi, ma servono capitale tuo e tutto il rischio è su di te."], ["Prop trader", "Non rischi capitale tuo per accedere: superi una challenge e ricevi un conto finanziato. Split 70-80%, ma regole e drawdown."], ["Quando scegliere", "Prop se hai poco capitale e vuoi struttura. Broker se hai capitale e vuoi libertà."], ["Reality check", "Molti li combinano: prop per imparare sotto pressione, broker per scalare. Nessuna scorciatoia."]];

    function track(event) {
      if (!UID) return;
      fetch(TRACK, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ telegram_id: UID, tutorial_key: KEY, event }) }).catch(() => {});
    }
    function goBack() { history.length > 1 ? history.back() : (location.href = "../dashboard.html"); }

    let i = 0;
    const bar = document.getElementById("bar"), pnum = document.getElementById("pnum");
    const kick = document.getElementById("kick"), sh = document.getElementById("sh"), sb = document.getElementById("sb");
    const prev = document.getElementById("prev"), next = document.getElementById("next");

    function show() {
      const s = STEPS[i];
      kick.textContent = "Passo " + (i + 1);
      sh.textContent = s[0];
      sb.textContent = s[1];
      bar.style.width = ((i + 1) / STEPS.length * 100) + "%";
      pnum.textContent = (i + 1) + " / " + STEPS.length;
      prev.disabled = i === 0;
      next.textContent = i === STEPS.length - 1 ? "Fatto, ho capito" : "Avanti";
      next.className = "btn btn-accent";
    }
    prev.addEventListener("click", () => { if (i > 0) { i--; show(); } });
    next.addEventListener("click", () => {
      if (i < STEPS.length - 1) { i++; show(); return; }
      track("done");
      if (TG && TG.HapticFeedback) TG.HapticFeedback.notificationOccurred("success");
      document.getElementById("stage").innerHTML =
        '<div class="done"><div class="big">✅</div><span class="badge">✓ Tutorial completato</span><b>Hai finito Prop vs Broker</b><span>Ora sai come funziona. Quando sei pronto, attiva il servizio dalla tua dashboard.</span></div>' +
        '<div class="navrow"><button class="btn btn-ghost" id="b1">Torna al servizio</button><button class="btn btn-accent" id="b2">Chiudi</button></div>';
      document.getElementById("b1").addEventListener("click", goBack);
      document.getElementById("b2").addEventListener("click", () => { if (TG) TG.close(); else goBack(); });
    });

    document.getElementById("back").addEventListener("click", goBack);
    track("open");
    show();
  </script>
</body>
</html>
