<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>La mia Dashboard - Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0a0a; --surface:#151515; --surface2:#1d1d1d; --line:rgba(255,255,255,.07);
      --text:#f4f4f5; --muted:#8c8c92; --accent:#0d9e88; --accent2:#16c9aa; --danger:#ff5a5a;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(900px 480px at 50% -8%, rgba(13,158,136,.14), transparent 60%),
        var(--bg);
      background-attachment:fixed; color:var(--text); padding:14px 14px 40px; line-height:1.5;
      -webkit-font-smoothing:antialiased; letter-spacing:.1px;
    }
    .wrap { max-width:520px; margin:0 auto; }

    /* Brand header */
    .brand { display:flex; align-items:center; justify-content:space-between; padding:6px 2px 16px; }
    .brand-mark { display:flex; align-items:center; gap:9px; font-weight:800; font-size:15px; letter-spacing:1.5px; }
    .brand-mark .bdot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 14px 2px rgba(13,158,136,.7); }
    .brand-tag { font-size:11px; color:var(--muted); letter-spacing:.3px; }

    h1 { font-size:23px; font-weight:800; letter-spacing:-.3px; margin-bottom:2px; }
    h1 .em { color:var(--accent); }
    .sub { font-size:13px; color:var(--muted); margin-bottom:18px; }

    .card {
      background:linear-gradient(180deg, var(--surface2), var(--surface));
      border:1px solid var(--line); border-radius:18px; padding:4px 16px; margin-bottom:12px;
      box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.35);
    }
    .card.soft { padding:16px; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 0; font-size:14px; border-top:1px solid var(--line); }
    .row:first-child { border-top:none; }
    .row > span { color:var(--muted); font-weight:500; }
    .row > b { font-weight:600; }

    .badge { display:inline-block; background:rgba(13,158,136,.16); color:var(--accent2); font-size:12px; font-weight:700; padding:4px 11px; border-radius:999px; border:1px solid rgba(13,158,136,.28); }

    .status { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; }
    .status .dot { width:9px; height:9px; border-radius:50%; flex:none; }
    .status.on { color:var(--accent2); }
    .status.on .dot { background:var(--accent2); animation:pulseGreen 2.2s ease-out infinite; }
    .status.off { color:var(--danger); }
    .status.off .dot { background:var(--danger); animation:pulseRed 1.2s ease-out infinite; }
    @keyframes pulseGreen { 0%{box-shadow:0 0 0 0 rgba(22,201,170,.5);} 70%{box-shadow:0 0 0 7px rgba(22,201,170,0);} 100%{box-shadow:0 0 0 0 rgba(22,201,170,0);} }
    @keyframes pulseRed { 0%{box-shadow:0 0 0 0 rgba(255,90,90,.6);transform:scale(1);} 70%{box-shadow:0 0 0 8px rgba(255,90,90,0);transform:scale(1.08);} 100%{box-shadow:0 0 0 0 rgba(255,90,90,0);transform:scale(1);} }

    .sect { display:flex; align-items:center; gap:8px; font-size:11px; text-transform:uppercase; letter-spacing:1.2px; font-weight:700; color:var(--muted); margin:22px 4px 10px; }
    .sect::before { content:""; width:3px; height:13px; border-radius:2px; background:var(--accent); }

    .item {
      display:flex; justify-content:space-between; align-items:center;
      background:linear-gradient(180deg, var(--surface2), var(--surface));
      border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:9px; cursor:pointer;
      transition:transform .12s ease, border-color .12s ease;
    }
    .item:active { transform:scale(.985); border-color:rgba(13,158,136,.4); }
    .item b { font-size:15px; font-weight:600; }
    .item .ch { color:var(--accent); font-size:20px; font-weight:400; line-height:1; }

    .hidden { display:none; }
    .ptext { font-size:13px; color:var(--muted); white-space:pre-line; line-height:1.55; }
    .reflink { word-break:break-all; font-size:13px; font-weight:600; color:var(--accent2); background:rgba(13,158,136,.08); border:1px solid rgba(13,158,136,.2); border-radius:12px; padding:11px 13px; margin:10px 0; }
    .fld { width:100%; padding:12px 13px; border-radius:12px; background:#0e0e0e; color:var(--text); border:1px solid var(--line); margin-bottom:9px; font-family:inherit; font-size:14px; }
    .fld:focus { outline:none; border-color:rgba(13,158,136,.5); }

    .btn { width:100%; padding:14px; border:none; border-radius:13px; font-weight:700; font-size:14px; font-family:inherit; cursor:pointer; margin-top:10px; transition:transform .12s ease, filter .12s ease; }
    .btn:active { transform:scale(.985); }
    .btn-accent { background:linear-gradient(180deg, var(--accent2), var(--accent)); color:#04221c; box-shadow:0 6px 18px rgba(13,158,136,.32); }
    .btn-danger { background:#2a1414; color:#ff7b7b; border:1px solid rgba(255,90,90,.25); }
    .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--line); }
    .err { text-align:center; color:var(--muted); padding:48px 20px; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="brand">
      <div class="brand-mark"><span class="bdot"></span>BUSINESS UP</div>
      <div class="brand-tag">Nessun guru. Nessun filtro.</div>
    </header>
    <div id="app"><div class="err">Caricamento...</div></div>
  </div>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const EDGE = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const app = document.getElementById("app");
    const STAGE = { nuovo:"Nuovo", qualificato:"Qualificato", squalificato:"Non idoneo ora", contattato:"In contatto", cliente:"Cliente" };

    function close() { if (TG) TG.close(); }

    async function load() {
      if (!TG || !TG.initData) { app.innerHTML = '<div class="err">Apri questa pagina dal bot Telegram.</div>'; return; }
      let d;
      try {
        const r = await fetch(EDGE + "/me", { headers: { "x-telegram-init-data": TG.initData } });
        d = await r.json();
        if (!r.ok) throw 0;
      } catch { app.innerHTML = '<div class="err">Errore. Riapri dal bot.</div>'; return; }
      let aff = {};
      try { const ra = await fetch(EDGE + "/my-affiliate", { headers: { "x-telegram-init-data": TG.initData } }); if (ra.ok) aff = await ra.json(); } catch {}
      let totServizi = 0;
      try { const rc = await fetch(EDGE + "/catalogo"); if (rc.ok) { const c = await rc.json(); totServizi = (c.categorie || []).reduce((n, cat) => n + ((cat.servizi || []).length), 0); } } catch {}
      render(d, aff, totServizi);
    }

    // Fase del funnel in cui si trova l'utente.
    function faseLabel(l, sondDone, tutDone, attivo) {
      const st = l.pipeline_stage;
      if (st === "cliente" || attivo) return "Cliente";
      if (st === "squalificato") return "Non idoneo";
      if (!sondDone) return "Sondaggio";
      if (tutDone < 4) return "Tutorial";
      return "Valutazione";
    }
    // Idoneità in base al sondaggio (verrà approfondita con il nuovo sondaggio).
    function idoneita(l, attivo) {
      const st = l.pipeline_stage;
      if (st === "cliente" || attivo) return { txt: "Cliente attivo", col: "var(--accent)" };
      if (st === "qualificato") return { txt: "Idoneo", col: "var(--accent)" };
      if (st === "squalificato") return { txt: "Non idoneo ora", col: "#ff5a5a" };
      return { txt: "Da valutare", col: "var(--muted)" };
    }
    // Livello sintetico dal sondaggio.
    function livelloLabel(s) {
      const v = String((s && s.livello_trading) || "").toLowerCase();
      if (v.includes("avanz") || v.includes("espert")) return "Esperto";
      if (v.includes("interm")) return "Intermedio";
      if (v.includes("princ") || v.includes("base")) return "Base";
      return (s && s.livello_trading) || "-";
    }

    function render(d, aff, totServizi) {
      aff = aff || {};
      totServizi = totServizi || 0;
      const l = d.lead || {};
      const s = d.sondaggio;
      const tutDone = (d.tutorial || []).filter(t => t.completato).length;
      const servizi = d.servizi || [];
      const serviziAttivi = servizi.filter(x => String(x.stato || "").toLowerCase() === "attivo");
      const attivo = serviziAttivi.length > 0;
      const sondDone = !!s || !!l.sondaggio_completato;
      const fase = faseLabel(l, sondDone, tutDone, attivo);
      const idon = idoneita(l, attivo);
      let profilo = '<div class="ptext">Sondaggio non ancora fatto.</div>';
      if (s) profilo = `
        <div class="row"><span>Idoneità</span><b style="color:${idon.col}">${idon.txt}</b></div>
        <div class="row"><span>Livello</span><b>${livelloLabel(s)}</b></div>
        <div class="row"><span>Esperienza</span><b>${s.broker_usati || "-"}</b></div>
        <div class="row"><span>Capitale</span><b>${s.capitale || "-"}</b></div>
        <div class="row"><span>Interesse</span><b>${s.prodotto_preferito || "-"}</b></div>`;
      const serviziHtml = serviziAttivi.length
        ? serviziAttivi.map(x => `<div class="item serv-item" data-nome="${(x.nome || "").replace(/"/g, "&quot;")}"><b>${x.nome}</b><span class="ch">›</span></div>`).join("")
        : '<div class="ptext">Nessun servizio attivo. Vai su Business List per attivarne uno.</div>';

      // Sezione affiliazione: attivo → ref link + condividi; non attivo → richiesta.
      const affListHtml = (aff.links || []).map(x => `<div class="row"><span>${x.nome}</span><b style="color:${x.approvato ? "var(--accent2)" : "var(--muted)"}">${x.approvato ? "Approvato" : "In attesa"}</b></div>`).join("");
      const affHtml = attivo
        ? `<div class="ptext" style="margin-bottom:4px">Il tuo link da condividere. Chi entra da qui e attiva un servizio su cui sei affiliato, usa il TUO ref.</div>
           <div class="reflink">${aff.ref_url || "-"}</div>
           <button class="btn btn-accent" id="shareRef">Condividi</button>
           <button class="btn btn-ghost" id="copyRef">Copia link</button>
           ${affListHtml ? `<div id="affList" style="margin-top:6px">${affListHtml}</div>` : ""}`
        : `<div class="ptext" style="margin-bottom:10px">Diventa affiliato di un servizio. Manda la richiesta col tuo ref link: la valutiamo e ti avvisiamo.</div>
           <select id="affServ" class="fld">
             ${(aff.servizi || []).map(x => `<option value="${x.id}">${x.nome}</option>`).join("")}
           </select>
           <input id="affLink" class="fld" placeholder="Incolla il tuo ref link" />
           <button class="btn btn-accent" id="affSend">Invia richiesta</button>
           ${affListHtml ? `<div id="affList" style="margin-top:6px">${affListHtml}</div>` : ""}`;

      app.innerHTML = `
        <h1>Ciao <span class="em">${l.nome || ""}</span></h1>
        <div class="sub">La tua dashboard personale</div>
        <div class="card">
          <div class="row"><span>Stato</span><span class="status ${attivo ? "on" : "off"}"><span class="dot"></span>${attivo ? "Attivo" : "Non attivo"}</span></div>
          <div class="row"><span>Fase</span><span class="badge">${fase}</span></div>
          <div class="row"><span>Servizi attivi</span><b>${serviziAttivi.length}/${totServizi || "-"}</b></div>
        </div>
        <div class="sect">Il tuo profilo</div>
        <div class="card${s ? "" : " soft"}">${profilo}</div>
        <div class="sect">I tuoi servizi</div>
        ${serviziAttivi.length ? serviziHtml : '<div class="card soft"><div class="ptext">Nessun servizio attivo. Vai su Business List per attivarne uno.</div></div>'}
        <div class="sect">Affiliazione</div>
        <div class="card soft">${affHtml}</div>
        <div class="sect">Menu</div>
        <div class="item" id="privacyItem"><b>🔒 Privacy e dati</b><span class="ch">›</span></div>
        <div id="privacyPanel" class="card soft hidden">
          <div class="ptext" id="privacyText"></div>
          <button class="btn btn-danger" id="delBtn">Cancella i miei dati</button>
        </div>
        <button class="btn btn-accent" id="back">Torna al bot</button>`;

      document.getElementById("privacyItem").addEventListener("click", () => {
        const p = document.getElementById("privacyPanel");
        document.getElementById("privacyText").textContent =
          "Informativa privacy - Business UP\n\nTitolare: Business UP (antonybusinesshub@gmail.com).\nDati: ID/username Telegram, nome, risposte sondaggio, uso del bot.\nFinalita: indirizzarti ai metodi adatti e contattarti.\nBase: il tuo consenso. Non vendiamo i tuoi dati.\nPuoi cancellare tutto qui sotto in qualsiasi momento.";
        p.classList.toggle("hidden");
      });
      document.getElementById("delBtn").addEventListener("click", async () => {
        const ok = TG && TG.showConfirm
          ? await new Promise(res => TG.showConfirm("Cancellare TUTTI i tuoi dati? Azione definitiva.", res))
          : confirm("Cancellare TUTTI i tuoi dati?");
        if (!ok) return;
        await fetch(EDGE + "/delete-me", { method:"POST", headers:{ "x-telegram-init-data": TG.initData } });
        app.innerHTML = '<div class="err">Dati cancellati. Scrivi /start al bot per ricominciare.</div>';
      });
      document.getElementById("back").addEventListener("click", close);

      // Servizi attivi → dashboard del servizio (in arrivo)
      document.querySelectorAll(".serv-item").forEach(el => el.addEventListener("click", () => {
        const nome = el.getAttribute("data-nome") || "";
        if (TG && TG.showAlert) TG.showAlert("Dashboard di \"" + nome + "\" in arrivo.");
      }));

      // Condividi ref link
      const shareBtn = document.getElementById("shareRef");
      if (shareBtn) shareBtn.addEventListener("click", () => {
        const url = aff.ref_url || "";
        if (!url) return;
        const msg = "Entra in Business UP. Nessun guru, nessun filtro: dati e logica.";
        if (TG && TG.openTelegramLink) TG.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(url) + "&text=" + encodeURIComponent(msg));
        else if (navigator.share) navigator.share({ url, text: msg }).catch(() => {});
        else if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => {});
      });

      const copyBtn = document.getElementById("copyRef");
      if (copyBtn) copyBtn.addEventListener("click", () => {
        const url = aff.ref_url || "";
        if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => {});
        copyBtn.textContent = "Copiato ✓";
        setTimeout(() => copyBtn.textContent = "Copia link", 1500);
      });
      const affSend = document.getElementById("affSend");
      if (affSend) affSend.addEventListener("click", async () => {
        const sid = document.getElementById("affServ").value;
        const link = document.getElementById("affLink").value.trim();
        if (!sid || !link) return;
        affSend.disabled = true; affSend.textContent = "Invio...";
        try {
          await fetch(EDGE + "/affiliate-request", { method: "POST", headers: { "Content-Type": "application/json", "x-telegram-init-data": TG.initData }, body: JSON.stringify({ servizio_id: parseInt(sid), ref_link: link }) });
          affSend.textContent = "✓ Richiesta inviata";
          if (TG && TG.showAlert) TG.showAlert("Richiesta inviata. Ti avviso quando viene approvata.");
        } catch { affSend.disabled = false; affSend.textContent = "Invia richiesta"; }
      });
    }
    load();
  </script>
</body>
</html>
