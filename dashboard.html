<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>La mia Dashboard - Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg: var(--tg-theme-bg-color,#0a0a0a); --card: var(--tg-theme-secondary-bg-color,#1a1a1a);
      --text: var(--tg-theme-text-color,#fff); --muted: var(--tg-theme-hint-color,#8a8a8a); --accent:#0d9e88; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:18px 14px 36px; line-height:1.5; }
    h1 { font-size:20px; font-weight:700; color:var(--accent); margin-bottom:2px; }
    .sub { font-size:13px; color:var(--muted); margin-bottom:16px; }
    .card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:12px; }
    .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
    .row span { color:var(--muted); }
    .badge { display:inline-block; background:rgba(13,158,136,.18); color:var(--accent); font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; }
    .sect { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:18px 0 8px; }
    .item { display:flex; justify-content:space-between; align-items:center; background:var(--card); border-radius:12px; padding:14px 16px; margin-bottom:8px; cursor:pointer; }
    .item b { font-size:15px; }
    .item .ch { color:var(--muted); }
    .hidden { display:none; }
    .ptext { font-size:13px; color:var(--muted); white-space:pre-line; }
    .btn { width:100%; padding:13px; border:none; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; margin-top:10px; }
    .btn-accent { background:var(--accent); color:#042; }
    .btn-danger { background:#3a1a1a; color:#ff6b6b; }
    .btn-ghost { background:var(--card); color:var(--text); }
    .err { text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; }
  </style>
</head>
<body>
  <div id="app"><div class="err">Caricamento...</div></div>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const EDGE = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const app = document.getElementById("app");
    const STAGE = { nuovo:"Nuovo", qualificato:"Qualificato", squalificato:"Non idoneo ora", contattato:"In contatto", cliente:"Cliente" };

    function close() { if (TG) TG.close(); }

    async function load() {
      if (!TG || !TG.initData) { app.innerHTML = '<div class="err">Apri questa pagina dal bot Telegram.</div>'; return; }
      let d;
      try {
        const r = await fetch(EDGE + "/me", { headers: { "x-telegram-init-data": TG.initData } });
        d = await r.json();
        if (!r.ok) throw 0;
      } catch { app.innerHTML = '<div class="err">Errore. Riapri dal bot.</div>'; return; }
      let aff = {};
      try { const ra = await fetch(EDGE + "/my-affiliate", { headers: { "x-telegram-init-data": TG.initData } }); if (ra.ok) aff = await ra.json(); } catch {}
      render(d, aff);
    }

    function render(d, aff) {
      aff = aff || {};
      const l = d.lead || {};
      const s = d.sondaggio;
      const tutDone = (d.tutorial || []).filter(t => t.completato).length;
      const servizi = d.servizi || [];
      let profilo = '<div class="ptext">Sondaggio non ancora fatto.</div>';
      if (s) profilo = `
        <div class="row"><span>Livello</span><b>${s.livello_trading || "-"}</b></div>
        <div class="row"><span>Esperienza</span><b>${s.broker_usati || "-"}</b></div>
        <div class="row"><span>Capitale</span><b>${s.capitale || "-"}</b></div>
        <div class="row"><span>Interesse</span><b>${s.prodotto_preferito || "-"}</b></div>`;
      const serviziHtml = servizi.length
        ? servizi.map(x => `<div class="row"><span>${x.nome}</span><b>${x.stato}</b></div>`).join("")
        : '<div class="ptext">Nessun servizio attivo.</div>';

      app.innerHTML = `
        <h1>Ciao ${l.nome || ""}</h1>
        <div class="sub">La tua dashboard personale</div>
        <div class="card">
          <div class="row"><span>Stato</span><span class="badge">${STAGE[l.pipeline_stage] || l.pipeline_stage || "-"}</span></div>
          <div class="row"><span>Tutorial completati</span><b>${tutDone}/4</b></div>
        </div>
        <div class="sect">Il tuo profilo</div>
        <div class="card">${profilo}</div>
        <div class="sect">I tuoi servizi</div>
        <div class="card">${serviziHtml}</div>
        <div class="sect">Affiliazione</div>
        <div class="card">
          <div class="ptext" style="margin-bottom:8px">Il tuo link da condividere. Chi entra da qui e attiva un servizio su cui sei affiliato, usa il TUO ref.</div>
          <div style="word-break:break-all;font-size:13px;color:var(--accent);margin-bottom:8px">${aff.ref_url || "-"}</div>
          <button class="btn btn-ghost" id="copyRef">Copia link</button>
        </div>
        <div class="card">
          <div class="ptext" style="margin-bottom:8px">Diventa affiliato di un servizio (serve essere attivo; valutiamo la richiesta):</div>
          <select id="affServ" style="width:100%;padding:11px;border-radius:10px;background:var(--bg);color:var(--text);border:1px solid var(--muted);margin-bottom:8px">
            ${(aff.servizi || []).map(s => `<option value="${s.id}">${s.nome}</option>`).join("")}
          </select>
          <input id="affLink" placeholder="Incolla il tuo ref link" style="width:100%;padding:11px;border-radius:10px;background:var(--bg);color:var(--text);border:1px solid var(--muted);margin-bottom:8px" />
          <button class="btn btn-accent" id="affSend">Invia richiesta</button>
          <div id="affList" style="margin-top:10px">${(aff.links || []).map(l => `<div class="row"><span>${l.nome}</span><b style="color:${l.approvato ? "var(--accent)" : "var(--muted)"}">${l.approvato ? "Approvato" : "In attesa"}</b></div>`).join("")}</div>
        </div>
        <div class="sect">Menu</div>
        <div class="item" id="privacyItem"><b>🔒 Privacy e dati</b><span class="ch">›</span></div>
        <div id="privacyPanel" class="card hidden">
          <div class="ptext" id="privacyText"></div>
          <button class="btn btn-danger" id="delBtn">Cancella i miei dati</button>
        </div>
        <button class="btn btn-accent" id="back">Torna al bot</button>`;

      document.getElementById("privacyItem").addEventListener("click", () => {
        const p = document.getElementById("privacyPanel");
        document.getElementById("privacyText").textContent =
          "Informativa privacy - Business UP\n\nTitolare: Business UP (antonybusinesshub@gmail.com).\nDati: ID/username Telegram, nome, risposte sondaggio, uso del bot.\nFinalita: indirizzarti ai metodi adatti e contattarti.\nBase: il tuo consenso. Non vendiamo i tuoi dati.\nPuoi cancellare tutto qui sotto in qualsiasi momento.";
        p.classList.toggle("hidden");
      });
      document.getElementById("delBtn").addEventListener("click", async () => {
        const ok = TG && TG.showConfirm
          ? await new Promise(res => TG.showConfirm("Cancellare TUTTI i tuoi dati? Azione definitiva.", res))
          : confirm("Cancellare TUTTI i tuoi dati?");
        if (!ok) return;
        await fetch(EDGE + "/delete-me", { method:"POST", headers:{ "x-telegram-init-data": TG.initData } });
        app.innerHTML = '<div class="err">Dati cancellati. Scrivi /start al bot per ricominciare.</div>';
      });
      document.getElementById("back").addEventListener("click", close);

      const copyBtn = document.getElementById("copyRef");
      if (copyBtn) copyBtn.addEventListener("click", () => {
        const url = aff.ref_url || "";
        if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => {});
        copyBtn.textContent = "Copiato ✓";
        setTimeout(() => copyBtn.textContent = "Copia link", 1500);
      });
      const affSend = document.getElementById("affSend");
      if (affSend) affSend.addEventListener("click", async () => {
        const sid = document.getElementById("affServ").value;
        const link = document.getElementById("affLink").value.trim();
        if (!sid || !link) return;
        affSend.disabled = true; affSend.textContent = "Invio...";
        try {
          await fetch(EDGE + "/affiliate-request", { method: "POST", headers: { "Content-Type": "application/json", "x-telegram-init-data": TG.initData }, body: JSON.stringify({ servizio_id: parseInt(sid), ref_link: link }) });
          affSend.textContent = "✓ Richiesta inviata";
          if (TG && TG.showAlert) TG.showAlert("Richiesta inviata. Ti avviso quando viene approvata.");
        } catch { affSend.disabled = false; affSend.textContent = "Invia richiesta"; }
      });
    }
    load();
  </script>
</body>
</html>
