<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>News - Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0b0c0e; --surface:#15171a; --surface2:#1d2024; --line:rgba(255,255,255,.07); --text:#eceef0; --muted:#8b9096; --accent:#0d9e88; --accent2:#19cdac; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:14px 14px calc(34px + env(safe-area-inset-bottom)); line-height:1.5; -webkit-font-smoothing:antialiased; }
    body > * { max-width:520px; margin-left:auto; margin-right:auto; }
    .head { display:flex; align-items:center; gap:11px; margin-bottom:16px; padding-top:6px; }
    .head .logo { width:40px; height:40px; border-radius:12px; background:var(--accent); display:grid; place-items:center; font-weight:800; color:#04221c; }
    .head b { font-size:18px; font-weight:700; } .head span { font-size:12px; color:var(--muted); display:block; }
    .ch { display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:9px; cursor:pointer; transition:background .12s ease; }
    .ch:active { background:var(--surface2); }
    .ch .ic { width:40px; height:40px; border-radius:11px; background:rgba(13,158,136,.14); display:grid; place-items:center; font-size:18px; flex:none; }
    .ch .t { flex:1; } .ch .t b { font-size:15px; display:block; font-weight:600; } .ch .t span { font-size:12px; color:var(--muted); }
    .ch .ar { color:var(--muted); font-size:19px; }
    .post { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:15px 16px; margin-bottom:11px; }
    .post .top { display:flex; align-items:center; margin-bottom:6px; }
    .post .date { font-size:11px; color:var(--muted); margin-left:auto; }
    .post .titolo { font-size:16px; font-weight:700; margin:2px 0 5px; }
    .post .testo { font-size:14px; color:#cfd2d6; white-space:pre-line; line-height:1.6; }
    .post img { width:100%; border-radius:12px; margin-top:10px; }
    .x { font-size:14px; color:var(--accent2); cursor:pointer; margin-bottom:14px; display:inline-block; font-weight:600; }
    .empty { text-align:center; color:var(--muted); padding:48px 20px; font-size:14px; }
    .back { width:100%; margin-top:18px; padding:14px; border:none; border-radius:13px; background:var(--surface2); color:var(--text); border:1px solid var(--line); font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
  <div class="head"><div class="logo">BU</div><div><b>News & Aggiornamenti</b><span>Scegli un canale</span></div></div>
  <div id="view"><div class="empty">Caricamento...</div></div>
  <button class="back" id="back">Torna al bot</button>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const EDGE = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const view = document.getElementById("view");
    const ICONS = { "Broker vs Broker":"🔁","Prop vs Broker":"🏦","Bonus ADM":"🎁","BvB Swap":"🔄" };
    let DATA = { canali: [], news: [] };

    function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function fmt(d){ try{ const x=new Date(d); return x.toLocaleDateString("it-IT",{day:"2-digit",month:"short"})+" "+x.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}); }catch{ return ""; } }
    function newsOf(sid){ return DATA.news.filter(n => sid===null ? n.servizio_id==null : n.servizio_id===sid); }

    function renderCanali() {
      document.querySelector(".head span").textContent = "Scegli un canale";
      view.innerHTML = DATA.canali.map((c) => {
        const cnt = newsOf(c.servizio_id).length;
        return `<div class="ch" data-sid="${c.servizio_id==null?"":c.servizio_id}">
          <div class="ic">${c.servizio_id==null ? "📢" : (ICONS[c.nome]||"📊")}</div>
          <div class="t"><b>${esc(c.nome)}</b><span>${cnt} ${cnt===1?"news":"news"}</span></div>
          <div class="ar">›</div></div>`;
      }).join("");
      view.querySelectorAll(".ch").forEach((el) => el.addEventListener("click", () => {
        const sid = el.dataset.sid === "" ? null : parseInt(el.dataset.sid);
        renderFeed(sid);
      }));
    }

    function renderFeed(sid) {
      const canale = DATA.canali.find(c => (c.servizio_id==null?null:c.servizio_id) === sid) || { nome: "Canale" };
      document.querySelector(".head span").textContent = canale.nome;
      const items = newsOf(sid);
      const list = items.length ? items.map((n) => `
        <div class="post">
          <div class="top"><span class="date">${fmt(n.data)}</span></div>
          ${n.titolo ? `<div class="titolo">${esc(n.titolo)}</div>` : ""}
          ${n.testo ? `<div class="testo">${esc(n.testo)}</div>` : ""}
          ${n.immagine ? `<img src="${esc(n.immagine)}" alt="" />` : ""}
        </div>`).join("") : '<div class="empty">Nessuna news in questo canale.</div>';
      view.innerHTML = `<span class="x" id="toCanali">‹ Tutti i canali</span>${list}`;
      document.getElementById("toCanali").addEventListener("click", renderCanali);
    }

    async function load() {
      if (!TG || !TG.initData) { view.innerHTML = '<div class="empty">Apri questa pagina dal bot.</div>'; return; }
      try { const r = await fetch(EDGE + "/news", { headers: { "x-telegram-init-data": TG.initData } }); DATA = await r.json(); if (!r.ok) throw 0; }
      catch { view.innerHTML = '<div class="empty">Errore. Riapri dal bot.</div>'; return; }
      renderCanali();
    }
    document.getElementById("back").addEventListener("click", () => { if (TG) TG.close(); });
    load();
  </script>
</body>
</html>
