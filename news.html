<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>News - Business UP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg: var(--tg-theme-bg-color,#0a0a0a); --card: var(--tg-theme-secondary-bg-color,#1a1a1a);
      --text: var(--tg-theme-text-color,#fff); --muted: var(--tg-theme-hint-color,#8a8a8a); --accent:#0d9e88; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:16px 14px 36px; line-height:1.55; }
    .head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .head .logo { width:38px; height:38px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; color:#042; }
    .head b { font-size:18px; } .head span { font-size:12px; color:var(--muted); display:block; }
    .post { background:var(--card); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
    .post .top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .post .tag { font-size:11px; font-weight:600; padding:2px 9px; border-radius:20px; background:rgba(13,158,136,.18); color:var(--accent); }
    .post .tag.gen { background:rgba(255,255,255,.08); color:var(--muted); }
    .post .date { font-size:11px; color:var(--muted); margin-left:auto; }
    .post .titolo { font-size:16px; font-weight:600; margin:2px 0 4px; }
    .post .testo { font-size:14px; color:var(--text); white-space:pre-line; }
    .post img { width:100%; border-radius:10px; margin-top:10px; }
    .empty { text-align:center; color:var(--muted); padding:50px 20px; font-size:14px; }
    .back { width:100%; margin-top:18px; padding:14px; border:none; border-radius:12px; background:var(--card); color:var(--text); font-weight:600; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="head">
    <div class="logo">BU</div>
    <div><b>News & Aggiornamenti</b><span>Business UP + i tuoi servizi</span></div>
  </div>
  <div id="feed"><div class="empty">Caricamento...</div></div>
  <button class="back" id="back">Torna al bot</button>

  <script>
    const TG = window.Telegram ? window.Telegram.WebApp : null;
    if (TG) { TG.ready(); TG.expand(); }
    const EDGE = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const feed = document.getElementById("feed");

    function fmt(d) {
      try { const x = new Date(d); return x.toLocaleDateString("it-IT", { day: "2-digit", month: "short" }) + " " + x.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" }); }
      catch { return ""; }
    }
    function esc(s) { return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    async function load() {
      if (!TG || !TG.initData) { feed.innerHTML = '<div class="empty">Apri questa pagina dal bot.</div>'; return; }
      let d;
      try { const r = await fetch(EDGE + "/news", { headers: { "x-telegram-init-data": TG.initData } }); d = await r.json(); if (!r.ok) throw 0; }
      catch { feed.innerHTML = '<div class="empty">Errore. Riapri dal bot.</div>'; return; }
      const news = d.news || [];
      if (!news.length) { feed.innerHTML = '<div class="empty">Nessuna novità per ora.<br>Torna a trovarci.</div>'; return; }
      feed.innerHTML = news.map((n) => `
        <div class="post">
          <div class="top">
            <span class="tag ${n.servizio ? "" : "gen"}">${n.servizio ? esc(n.servizio) : "Business UP"}</span>
            <span class="date">${fmt(n.data)}</span>
          </div>
          ${n.titolo ? `<div class="titolo">${esc(n.titolo)}</div>` : ""}
          ${n.testo ? `<div class="testo">${esc(n.testo)}</div>` : ""}
          ${n.immagine ? `<img src="${esc(n.immagine)}" alt="" />` : ""}
        </div>`).join("");
    }
    document.getElementById("back").addEventListener("click", () => { if (TG) TG.close(); });
    load();
  </script>
</body>
</html>
